<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Raport Santri {{ student.name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/eraport_final_v10.css') }}?v=10.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="er10-preview-body">
<header class="er10-preview-toolbar">
  <div><strong>Preview Raport Santri</strong><span>{{ student.name }} · {{ academic_year }} · {{ semester }}</span></div>
  <div class="er10-preview-actions">
    <button type="button" data-zoom-out title="Perkecil"><i class="fa-solid fa-minus"></i></button><span data-zoom-label>100%</span><button type="button" data-zoom-in title="Perbesar"><i class="fa-solid fa-plus"></i></button>
    {% if is_staff %}<a href="{{ url_for('eraport_academic', student_id=student.id, academic_year=academic_year, semester=semester) }}">Edit/Koreksi Nilai</a><a href="{{ url_for('eraport_class_dashboard', class_name=student.class_name, academic_year=academic_year, semester=semester) }}">Kembali</a>{% else %}<a href="{{ url_for('guardian_student_detail', student_id=student.id) }}">Kembali</a>{% endif %}
    {% if raport.status == 'Diterbitkan' %}<a class="primary" href="{{ url_for('report_pdf', student_id=student.id, academic_year=academic_year, semester=semester) }}"><i class="fa-solid fa-download"></i> Unduh PDF</a><a href="{{ url_for('report_pdf', student_id=student.id, academic_year=academic_year, semester=semester) }}" target="_blank"><i class="fa-solid fa-print"></i> Cetak</a>{% endif %}
  </div>
</header>
<main class="er10-preview-stage"><div class="er10-page-frame" data-report-page><img src="{{ url_for('report_image', student_id=student.id, academic_year=academic_year, semester=semester, v=raport.updated_at.timestamp() if raport.updated_at else 1) }}" alt="Preview Raport Santri {{ student.name }}"></div></main>
<script>
(()=>{let zoom=100;const page=document.querySelector('[data-report-page]');const label=document.querySelector('[data-zoom-label]');function apply(){page.style.width=zoom+'%';label.textContent=zoom+'%';}document.querySelector('[data-zoom-in]').addEventListener('click',()=>{zoom=Math.min(180,zoom+10);apply();});document.querySelector('[data-zoom-out]').addEventListener('click',()=>{zoom=Math.max(60,zoom-10);apply();});apply();})();
</script>
</body>
</html>
