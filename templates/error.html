{% extends "base.html" %}
{% block title %}Kesalahan {{ code }}{% endblock %}
{% macro error_panel() %}
<section class="card empty-state"><span class="error-code">{{ code }}</span><h1>{{ message }}</h1><a class="btn btn-primary" href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('home') }}">Kembali</a></section>
{% endmacro %}
{% block content %}{{ error_panel() }}{% endblock %}
{% block auth_content %}<section class="login-panel" style="min-height:100vh">{{ error_panel() }}</section>{% endblock %}
